<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Penniel Car Hire</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 h-screen flex items-center justify-center p-6">

    <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-md">
        <h1 class="text-3xl font-black text-center mb-2">PENNIEL <span class="text-blue-600">ADMIN</span></h1>
        <p class="text-gray-500 text-center mb-8 font-medium">Restricted Access Only</p>
        
        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Admin Email</label>
                <input type="email" id="email" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="admin@penniel.com" required>
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Password</label>
                <input type="password" id="password" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="••••••••" required>
            </div>
            <button type="submit" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold text-lg hover:bg-blue-700 transition transform hover:scale-[1.02] active:scale-95">
                Login to Dashboard
            </button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.success) {
                    // STEP 2: Save the Token (The "Key")
                    localStorage.setItem('adminToken', data.token);
                    window.location.href = 'admin.html';
                } else {
                    alert("Unauthorized: " + data.message);
                }
            } catch (err) {
                alert("Server error. Make sure your backend is running!");
            }
        };
    </script>
</body>
</html>
