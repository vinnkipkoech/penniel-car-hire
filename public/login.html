<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Penniel Car Hire</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 h-screen flex items-center justify-center p-6">

    <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-md">
        <h1 class="text-3xl font-black text-center mb-2">PENNIEL <span class="text-blue-600">CAR HIRE</span></h1>
        <p id="loginSubtitle" class="text-gray-500 text-center mb-8 font-medium">Login to your account</p>
        
        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Email Address</label>
                <input type="email" id="email" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="example@mail.com" required>
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Password</label>
                <input type="password" id="password" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="••••••••" required>
            </div>
            <button type="submit" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold text-lg hover:bg-blue-700 transition transform hover:scale-[1.02] active:scale-95">
                Sign In
            </button>
        </form>
        
        <div class="mt-6 text-center">
            <a href="index.html" class="text-sm text-gray-400 hover:text-blue-600 transition">← Back to Website</a>
        </div>
    </div>

    <script>
       document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        // DYNAMIC API URL:
        // If we are on localhost, talk to port 5000. 
        // If we are on Render, use the relative path.
        const API_BASE = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost' 
            ? 'http://localhost:5001' // Changed from 5000 to 5001 to match the new backend port
            : '';

        try {
            const response = await fetch(`${API_BASE}/api/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            // This handles the "SyntaxError: Unexpected token <" 
            // by checking if the response is actually JSON
            const contentType = response.headers.get("content-type");
            if (!contentType || !contentType.includes("application/json")) {
                throw new TypeError("Oops, the server didn't send back JSON. Is the backend running on port 5000?");
            }

            const data = await response.json();

            if (data.success) {
                // Store the token
                localStorage.setItem('adminToken', data.token);
                
                // Redirection Logic
                if (data.role === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    alert("Welcome back, " + (data.name || "Customer") + "!");
                    window.location.href = 'index.html';
                }
            } else {
                alert("Login Failed: " + data.message);
            }
        } catch (err) {
            alert(err.message || "Server error. Make sure your backend is running!");
            console.error("Login Error:", err);
        }
    };
    const result = await response.json();

if (response.ok) {
    // 1. Store the token
    localStorage.setItem('adminToken', result.token);

    // 2. Decide where to go
    // If your backend sends a "role", use result.role === 'admin'
    // Otherwise, for now, we send everyone who successfully logs in to the dashboard
    if (result.isAdmin) { 
        window.location.href = 'admin.html';
    } else {
        window.location.href = 'index.html'; // Regular users go to the homepage
    }
}
    </script>
</body>
</html>
